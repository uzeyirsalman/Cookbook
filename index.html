<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookbook</title>
    <!-- Favicon: Stylized Pot -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpath d='M15 45 Q50 95 85 45 L85 35 L15 35 Z' fill='%23e7d083' stroke='%23212529' stroke-width='4'/%3E%3Cpath d='M30 25 Q30 5 40 15 T50 15' fill='none' stroke='%23495057' stroke-width='4' stroke-linecap='round'/%3E%3Cpath d='M55 25 Q55 5 65 15 T75 15' fill='none' stroke='%23495057' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Link to external stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-wrapper">
        <header id="main-header">
            <!-- Merged Logo and Home Button -->
            <div class="header-left" id="home-btn" role="button" aria-label="Home">
                <!-- Modern Premium SVG Logo: Culinary Magic Cloche -->
                <svg class="app-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
                    <defs>
                        <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#4f46e5" />
                            <stop offset="100%" stop-color="#ec4899" />
                        </linearGradient>
                        <linearGradient id="sparkle-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#f59e0b" />
                            <stop offset="100%" stop-color="#f43f5e" />
                        </linearGradient>
                    </defs>
                    <!-- Background Soft Glow Circle -->
                    <circle cx="50" cy="50" r="46" fill="rgba(79, 70, 229, 0.05)" stroke="rgba(79, 70, 229, 0.12)" stroke-width="1.5" />
                    <!-- Sparkles/Magic (Culinary Excellence) -->
                    <path d="M 26 28 Q 30 28 30 24 Q 30 28 34 28 Q 30 28 30 32 Q 30 28 26 28 Z" fill="url(#sparkle-grad)" />
                    <path d="M 70 24 Q 73 24 73 21 Q 73 24 76 24 Q 73 24 73 27 Q 73 24 70 24 Z" fill="url(#sparkle-grad)" />
                    <path d="M 76 38 Q 78 38 78 36 Q 78 38 80 38 Q 78 38 78 40 Q 78 38 76 38 Z" fill="url(#sparkle-grad)" />
                    <!-- Chef's Cloche / Food Cover -->
                    <!-- Tray/Plate base -->
                    <path d="M 20 70 Q 50 73 80 70 A 2 2 0 0 0 80 66 Q 50 69 20 66 A 2 2 0 0 0 20 70 Z" fill="url(#logo-grad)" />
                    <!-- Dome Cover -->
                    <path d="M 26 62 Q 26 35 50 35 Q 74 35 74 62 Z" fill="url(#logo-grad)" opacity="0.9" />
                    <!-- Handle -->
                    <circle cx="50" cy="30" r="4.5" fill="url(#logo-grad)" />
                    <!-- Shine Highlight -->
                    <path d="M 34 58 A 20 20 0 0 1 50 41" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.45" />
                </svg>
                <h1 class="app-title"><span class="title-light">Cook</span><span class="title-bold">Book</span></h1>
            </div>

            <div class="header-right">
                <!-- Search Button and Input -->
                <div id="search-container" class="search-container">
                    <button id="search-btn" class="header-btn search-btn" aria-label="Search Recipes">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </button>
                    <input type="text" id="search-input" class="search-input" placeholder="Search...">
                </div>

                <!-- Hamburger Menu Toggle Button -->
                <button id="menu-toggle-btn" class="header-btn menu-toggle-btn" aria-label="Open Navigation Menu">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Modern Slide-out Navigation Drawer Overlay Backdrop -->
        <div id="menu-backdrop" class="menu-backdrop hidden"></div>
        
        <!-- Modern Slide-out Navigation Drawer -->
        <aside id="nav-drawer" class="nav-drawer hidden">
            <div class="drawer-header">
                <h2 class="drawer-title">Menu</h2>
                <button id="menu-close-btn" class="drawer-close-btn" aria-label="Close Menu">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>

            <!-- User Profile Header Section (Dynamic) -->
            <div id="drawer-user-section" class="drawer-user-section">
                <!-- Dynamic Content: Avatar + Email -->
            </div>

            <div class="drawer-content">
                <!-- Action Items List -->
                <ul class="drawer-menu-list">
                    <li id="menu-add-recipe-row" class="drawer-menu-item hidden">
                        <button id="menu-add-recipe-btn" class="drawer-action-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                            Add New Recipe
                        </button>
                    </li>
                    <li class="drawer-menu-item">
                        <button id="menu-random-recipe-btn" class="drawer-action-btn">
                            <span>🎲</span>
                            Random Recipe
                        </button>
                    </li>
                    <li id="menu-settings-row" class="drawer-menu-item hidden">
                        <button id="menu-settings-btn" class="drawer-action-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                            Backup & Database
                        </button>
                    </li>
                </ul>

                <!-- Preferences / Toggle Filter Section -->
                <div id="drawer-filter-section" class="drawer-filter-section hidden">
                    <span class="filter-section-title">Preferences</span>
                    <label class="toggle-switch drawer-toggle">
                        <input type="checkbox" id="own-recipes-filter">
                        <span class="slider"></span>
                        <span class="toggle-label">Show My Recipes Only</span>
                    </label>
                </div>
            </div>

            <!-- Auth Controls in Drawer Footer -->
            <div class="drawer-footer">
                <button id="drawer-login-btn" class="drawer-auth-btn login-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    Sign In with Google
                </button>
                <button id="drawer-logout-btn" class="drawer-auth-btn logout-btn hidden">
                    Sign Out
                </button>
            </div>
        </aside>

        <div id="loader"></div>

        <!-- Views will be dynamically swapped here -->
        <main id="tag-list-container">
            <!-- Sleek Category Card Style Controls -->
            <div id="category-controls-bar" class="category-controls-bar"></div>
            <!-- Grid list of tags -->
            <div id="tag-grid" class="tag-grid"></div>
        </main>
        <main id="recipe-list-container" class="hidden">
            <!-- Content will be generated by JS -->
            <div id="recipe-list"></div>
        </main>
        <!-- Search Results View -->
        <main id="search-results-container" class="hidden">
            <!-- Search results will be generated by JS -->
        </main>
        <main id="recipe-detail-container" class="hidden">
            <!-- Content will be generated by JS -->
            <div id="recipe-detail"></div>
        </main>
        <main id="recipe-form-container" class="hidden">
            <form id="recipe-form">
                <h2 id="form-mode-title">Add a New Recipe</h2>
                <div class="form-group">
                    <label for="recipe-title">Title</label>
                    <input type="text" id="recipe-title" placeholder="e.g., Classic Lasagna" required>
                </div>
                
                <div class="form-group">
                    <label for="recipe-tags">Tags</label>
                    <input type="text" id="recipe-tags" placeholder="e.g., Pasta, Italian, Dinner" required>
                </div>

                <div class="form-group">
                    <label for="recipe-ingredients">Ingredients</label>
                    <textarea id="recipe-ingredients" placeholder="Enter each ingredient on a new line..." required></textarea>
                </div>
                
                <div class="form-group">
                    <label for="recipe-instructions">Instructions</label>
                    <textarea id="recipe-instructions" placeholder="Enter the cooking instructions step-by-step..." required></textarea>
                </div>
                
                <button type="submit" id="save-button" class="form-button">Save Recipe</button>
            </form>
        </main>
    </div>
    <div id="notification"></div>
    
    <div id="custom-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3 id="modal-title">Are you sure?</h3>
            <p id="modal-message">Do you really want to delete this recipe? This action cannot be undone.</p>
            <div class="modal-actions">
                <button id="modal-confirm-btn" class="action-button delete-btn">Delete</button>
                <button id="modal-cancel-btn" class="action-button">Cancel</button>
            </div>
        </div>
    </div>

    <!-- settings modal for local backup and restore -->
    <div id="settings-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3>Backup & Restore</h3>
            <p style="color: var(--secondary-text); margin-bottom: 1.5rem; font-size: 0.9rem;">
                Manage your cookbook database. Export recipes to JSON or import from an existing backup.
            </p>
            <div class="settings-actions" style="display: flex; flex-direction: column; gap: 0.75rem;">
                <button id="export-backup-btn" class="form-button" style="background-color: var(--accent);">📥 Export Recipes (JSON)</button>
                
                <div style="border-top: 1px solid var(--border); margin: 0.5rem 0; padding-top: 1rem;">
                    <label for="import-file-input" class="import-label-btn">
                        📤 Import Recipes (JSON)
                    </label>
                    <input type="file" id="import-file-input" accept=".json" class="hidden">
                </div>
            </div>
            <div id="import-status" class="import-status"></div>
            
            <!-- In-app Activity Log timeline -->
            <div style="border-top: 1px solid var(--border); margin: 1.25rem 0 0 0; padding-top: 1rem; text-align: left;">
                <h4 style="margin: 0 0 0.5rem 0; font-weight: 700; font-size: 0.95rem; color: var(--primary-text);">Recent Activity Log</h4>
                <div id="activity-log-list" style="max-height: 140px; overflow-y: auto; font-size: 0.8rem; background: var(--background); border: 1px solid var(--border); padding: 0.5rem; border-radius: 8px; display: flex; flex-direction: column; gap: 0.4rem;">
                    <div style="color: var(--secondary-text);">Loading activity logs...</div>
                </div>
            </div>

            <div class="modal-actions" style="margin-top: 1.5rem; display: flex; justify-content: center;">
                <button id="settings-close-btn" class="action-button">Close</button>
            </div>
        </div>
    </div>
    
    <!-- Link to external JS modules -->
    <script type="module" src="app.js"></script>
</body>
</html>
